name: WiFi Crack Worker

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  crack:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq aircrack-ng crunch jq curl
        if [ ! -f /usr/share/wordlists/rockyou.txt ]; then
          sudo mkdir -p /usr/share/wordlists
          echo "Téléchargement de rockyou.txt (100k lignes)..."
          curl -sL -o /tmp/rockyou.txt.gz https://github.com/brannondorsey/naive-hashcat/releases/download/data/rockyou.txt
          gunzip -c /tmp/rockyou.txt.gz | head -n 100000 | sudo tee /usr/share/wordlists/rockyou.txt > /dev/null
          echo "rockyou.txt prêt ($(wc -l < /usr/share/wordlists/rockyou.txt) lignes)"
        fi
        
    - name: Run crack worker
      run: |
        chmod +x crack.sh
        bash crack.sh
